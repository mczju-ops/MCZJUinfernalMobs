# ===========================================
# 技能参数 (所有技能参数集中在此，便于调整)
# RANGE范围内触发的技能都为1秒判定一次
# ===========================================
skills:
  poisonous:
    type: PASSIVE
    display: "&2Poison"
    duration-ticks: 200  # 10s
    amplifier: 1         # 中毒II

  blinding:
    type: PASSIVE
    display: "&8Blinding"
    duration-ticks: 60   # 3s
    amplifier: 0

  withering:
    type: PASSIVE
    display: "&5Wither"
    duration-ticks: 180  # 9s
    amplifier: 1         # 凋零II

  quicksand:
    type: PASSIVE
    display: "&eQuicksand"
    duration-ticks: 180  # 9s
    amplifier: 1         # 缓慢II

  # ----- 被动/诞生时 (STAT) -----
  armoured:
    type: STAT
    display: "&bArmoured"
    armor-tier: 3        # 0=皮革 1=金 2=铁 3=钻石 4=下界合金；Lv11+ 时钻石可自动升为合金
    resistance-duration-ticks: -1  # -1 = 无限时长
    resistance-amplifier: 1  # 抗性II 不可穿盔甲时

  bullwark:
    type: STAT
    display: "&6Bulwark"
    duration-ticks: -1   
    amplifier: 2  # 抗性III

  1up:
    type: STAT
    display: "&a1up"
    hp-threshold: 8
    sound: "BLOCK_BREWING_STAND_BREW" # 1up 音效

  cloaked:
    type: STAT
    display: "&7Cloaked"
    duration-ticks: -1   

  ender:
    type: DUAL
    display: "&5Ender"
    cooldown-ticks: 60
    chance: 0.5
    distance: 2

  ghastly:
    type: RANGE
    display: "&cGhastly"
    range: 12
    chance: 0.3
    cooldown-ticks: 80
    damage: 8
    velocity: 1.2
    fire-ticks: 60
    explosion-power: 1   # ExplosionPower，击中时爆炸威力，0=不爆炸

  lifesteal:
    type: PASSIVE
    display: "&cLifesteal"
    duration-ticks: 80   # 4s
    heal-per-second: 1

  sprint:
    type: STAT
    display: "&eSprint"
    # 常驻速度：装配时施加无限时长速度效果（不再检测附近玩家）；range 已废弃可删
    amplifier: 1   # Speed II（等级 = amplifier+1）

  sapper:
    type: PASSIVE
    display: "&6Sapper"
    duration-ticks: 500  # 25s
    amplifier: 1         # 饥饿II

  webber:
    type: DUAL
    display: "&8Webber"
    cooldown-ticks: 40
    chance: 0.15
    sound: "BLOCK_COBWEB_PLACE"  # 蜘蛛网放置音效
    giant-sphere-chance: 0.15    # 蜘蛛网球概率（每只蜘蛛仅会以这种方式释放技能一次）
    giant-sphere-radius: 6       # 蜘蛛网球半径
    giant-sphere-thickness: 0.5  # 蜘蛛网球密度（0.01-1，越大越密越厚度）
    giant-sphere-lifetime-ticks: 200 # 蜘蛛网球存在时间 (10s)

  molten:
    type: PASSIVE
    display: "&4Molten"
    fire-ticks: 60  # 3s 燃烧

  archer:
    type: DUAL
    display: "&aArcher"
    cooldown-ticks: 40
    chance: 0.5
    arrow-count: 3
    speed: 3.0
    spread: 0.1
    spread-config: 6
    sound: "ENTITY_ARROW_SHOOT"

  necromancer:
    type: RANGE
    display: "&5Necromancer"
    range: 14
    chance: 0.3
    cooldown-ticks: 100
    velocity: 1.0

  firework:
    type: DUAL
    display: "&6Firework"
    cooldown-ticks: 20
    chance: 0.5      # 触发概率，1.0 为必触发
    power: 1
    launch-speed: 1
    trail: true
    flicker: false

  ghost:
    type: DEATH
    display: "&7Ghost"
    summon-level: 4   
    health: 40
    float-speed: 0.3

  confusing:
    type: PASSIVE
    display: "&dConfusing"
    duration-ticks: 80   # 4s
    amplifier: 2        # 反胃III


  thief:
    type: DUAL
    display: "&6Thief"
    cooldown-ticks: 80
    chance: 0.33
    sound: "entity.wind_charge.throw"
        # --- 反制缴械：副手持有 thief_counter 时触发 ---
    # 本次缴械仍会成功，但会把该怪的 thief 冷却延长 counter-duration-ticks，从而封住缴械能力
    counter-duration-ticks: 200
    counter-sound: "item.crossbow.quick_charge_1"
    # 螺旋粒子（围绕怪物转圈）。如果服务器该粒子名不存在，会自动回退到 SPELL_WITCH
    counter-particle: "item_cobweb"
    # 绘制线粒子：玩家眼睛 -> 本次缴械落点
    counter-line-particle: "small_gust"


  tosser:
    type: RANGE
    display: "&eTosser"
    range: 6
    chance: 0.3
    cooldown-ticks: 100
    force: 4       # 拉向怪物的力度
    upward: 0.2      # 竖直分量
    sound: "entity.breeze.jump"

  storm:
    type: DUAL
    display: "&9Storm"
    cooldown-ticks: 0    # 参考原版：每次受击/攻击都 roll，无冷却
    chance: 0.22         # 约 2/9，与原版一致
    damage: 5

  vengeance:
    type: PASSIVE
    display: "&cVengeance"
    chance: 0.5
    damage: 10
    sound: "entity.breeze.deflect"

  weakness:
    type: DUAL
    display: "&7Weakness"
    cooldown-ticks: 80
    duration-ticks: 500  # 25s
    amplifier: 1         # 虚弱II

  berserk:
    type: ACTIVE
    display: "&4Berserk"
    cooldown-ticks: 60
    self-damage: 1
    bonus-damage: 5
    sound: "ENTITY_PHANTOM_BITE"

  mama:
    type: PASSIVE
    display: "&dMama"
    chance: 0.15
    cooldown-ticks: 200   # 10 秒内最多触发一次
    count-by-tier: true  # true=按档位数量：初级1只/中级2只/高级3只/炒鸡4只；false=用下面 count
    count: 4             # 仅当 count-by-tier 为 false 时生效
    baby: true           # 有幼体的设幼体；无幼体的用 no-baby-scale 缩小体型
    no-baby-scale: 0.5   # 无 baby 形态的怪生成时体型缩放（需服务端支持如 Paper 1.20.5+）
    # 子怪等级：不写 tier-level-ranges 时按档位默认 初级1-3/中级2-5/高级3-7/炒鸡4-10；也可用 level-min/level-max 统一区间
    # tier-level-ranges:
    #   1: { min: 1, max: 3 }
    #   2: { min: 2, max: 5 }
    #   3: { min: 3, max: 7 }
    #   4: { min: 4, max: 10 }
    level-min: -1        # -1即不统一区间，按档位默认 
    level-max: -1
    # 黑名单：以下类型不会触发 mama（推荐使用，没列到的默认都可触发）
    blocked-types:
      - WARDEN
      - WITHER


  gravity:
    type: RANGE
    display: "&bGravity"
    range: 8
    chance: 0.3
    cooldown-ticks: 100
    duration-ticks: 100   # 漂浮 5s
    amplifier: 0
    sound: "ENTITY_SHULKER_SHOOT"

  mounted:
    type: STAT
    display: "&6Mounted"
    # 骑手白名单：只有这些实体类型拥有 mounted 词条时才会触发骑乘（留空=不限制）
    enabled-riders:
      - WITHER_SKELETON
      - STRAY
      - HUSK
      - ZOMBIE_VILLAGER
      - EVOKER
      - VINDICATOR
      - SKELETON
      - ZOMBIE
      - ENDERMAN
      - WITCH
      - SNOWMAN
      - VILLAGER
      - ILLUSIONER
      - DROWNED
      - ZOMBIFIED_PIGLIN
      - PIGLIN
      - BLAZE
      - BOGGED
      - STRIDER
    # 坐骑白名单（核心池）：从此列表随机生成坐骑，且生成后会被炒鸡化
    # 留空=不生成坐骑（mounted 实际不生效）
    enabled-mounts:
      - SPIDER
      - SKELETON_HORSE
      - ZOMBIE_HORSE
      - MULE
      - SLIME
      - GHAST
      - MAGMA_CUBE
      - PIG
      - SHEEP
      - COW
      - CHICKEN
      - HORSE
      - POLAR_BEAR
      - ZOGLIN
      - STRIDER
      - RAVAGER
      - BLAZE
      - ZOMBIE
    # 炒鸡坐骑等级：在生成位置按区域 level-chances / level-ranges / level-min~max 与全局规则计算（与天然炒鸡怪一致），不再读取下方项
    # level-min / level-max: 已废弃，可删除
    level-min: 1
    level-max: 10

  morph:
    type: DUAL
    display: "&5Morph"
    cooldown-ticks: 120
    chance: 0.1
    suppress-sound: BLOCK_VAULT_REJECT_REWARDED_PLAYER
    suppress-sound-pitch: 1
    sound: "block.ender_chest.open"   # 触发成功播放，变调
    sound-volume: 0.6
    sound-pitch: 0.7                 # 变调（小于 1 偏低，大于 1 偏高）
    morph-types:
      - BLAZE
      - BOGGED
      - CREEPER
      - ELDER_GUARDIAN
      - EVOKER
      - GUARDIAN
      - HUSK
      - MAGMA_CUBE
      - PILLAGER
      - RAVAGER
      - SKELETON
      - STRAY 
      - VINDICATOR
      - WARDEN
      - WITCH
      - WITHER_SKELETON
      - ZOGLIN
      - ZOMBIE
      - ZOMBIE_VILLAGER
      - CAVE_SPIDER
      - DROWNED
      - SPIDER
      - ZOMBIFIED_PIGLIN
      - WITHER
      # 动物
      - PIG
      - SHEEP
      - COW
      - CHICKEN
      - MUSHROOM_COW
      - HORSE
      - POLAR_BEAR
      - ARMADILLO     # 犰狳
      - DONKEY        # 驴
      - MULE          # 骡
      - SNIFFER       # 嗅探兽
      - GOAT          # 山羊
      - TRADER_LLAMA  # 行商羊驼
      - SQUID         # 鱿鱼
      - GLOW_SQUID    # 发光鱿鱼

  refrigerate:
    type: DUAL
    display: "&bRefrigerate"
    cooldown-ticks: 80
    chance: 0.25
    freeze-ticks: 100   # 5s 冰冻

  rust:
    type: PASSIVE
    display: "&8Rust"
    chance: 0.3
    damage-amount: 20    # 主手物品耐久降低量
    sound: "ENTITY_ITEM_BREAK"
    sound-pitch: 0.7     # 物品损坏音效变调

  vexsummoner:
    type: PASSIVE
    display: "&5VexSummoner"
    chance: 0.25
    cooldown-ticks: 60
    summon-count: 2
    max-nearby: 4
    count-range: 16       # 统计附近恼鬼数量的范围（格）
    sound: "ENTITY_EVOKER_PREPARE_SUMMON"
    sound-pitch: 0.8     # 准备召唤恼鬼音效变调

  wardenwrath:
    type: PASSIVE
    display: "&cWardenWrath"
    chance: 0.25
    cooldown-ticks: 80
    damage: 10
    knockback-horizontal: 2.5
    knockback-vertical: 0.5
    max-range: 15            # 超过此距离不触发
    decay-min-multiplier: 0.2 # 距离衰减：最大距离时伤害/击退为基础的 20%
    sound: "ENTITY_WARDEN_SONIC_BOOM"
    sound-volume: 1.8         # 音效音量
    sound-at-player: true     # 音效在玩家/怪物位置播放
    particle-sonic-boom: true # 怪物→玩家的 SONIC_BOOM 射线
    particle-ray-density: 20  # 射线上的粒子数量

  swap:
    type: PASSIVE
    display: "&dSwap"
    chance: 0.25
    cooldown-ticks: 60
    sound: "ENTITY_SHULKER_TELEPORT"   # 潜影贝传送音效
