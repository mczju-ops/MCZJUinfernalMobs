# ===========================================
# InfernalMobs - 炒鸡怪插件配置
# ===========================================

# true 时控制台输出 [InfernalMobs:debug:mechanize]：世界、方块坐标、是否 enabled-worlds、匹配区域与等级范围、最终等级与词条数
# 也可在游戏内临时开关：/im debug on|off（不写回本文件）
# 若控制台出现「Named entity ... died: ... was slain by...」，来自服务端 spigot.yml 的 settings.log-named-deaths（有自定义名的实体死亡），与本项无关；要关闭请在 spigot.yml 设 log-named-deaths: false
debug: false

# 炒鸡怪死亡时的经验倍率
# 最终经验 = 原版经验 × 炒鸡怪等级 × exp-multiplier
# 设为 0 则不修改原版经验；设为 1.0 表示每 1 级经验翻 1 倍（例：15 级怪 × 1.0 = 15 倍经验）
exp-multiplier: 5

# 全知之眼的射线判定距离（格），默认 20
infernal-eye:
  range: 20

# 幻形之锁（morph_controller，ItemCreator mi_id）：右键空气/方块时按准星射线延伸距离（格），便于略超原版右键实体距离。
# 设为 0 则关闭射线，仅能通过原版近距离右键实体使用。不影响已成功右键实体时的行为。
morph-controller:
  ray-range: 8

# 启用炒鸡怪刷怪的世界名称列表（无区域配置时的全局开关）
enabled-worlds:
  - SuperResource
  - Abyssal01
  - Abyssal02

# 哪些 CreatureSpawnEvent.SpawnReason 会被“炒鸡化”监听接管（大小写不敏感）
# 例如：NATURAL, SPAWNER, PATROL, REINFORCEMENTS, TRIAL_SPAWNER, RAID, JOCKEY ...
# 若为空或全部写错，会回退默认值：NATURAL/SPAWNER/PATROL/REINFORCEMENTS
infernal-spawn-reasons:
  - NATURAL
  - REINFORCEMENTS
  - TRIAL_SPAWNER
  - OMINOUS_ITEM_SPAWNER

# 全局默认（无区域匹配时使用）
defaults:
  level:
    base: 1
    scale: 100
    max: 100
    # 无区域匹配时：在此范围内随机，覆盖距离公式（世界名要�? regions 里一致）
    fallback-min: 1
    fallback-max: 10
    # level-chances: weighted per-level odds (overrides fallback-min/max when present)
    # Defaults chances (no region match):
    chances:
      '1': 13
      '2': 13
      '3': 13
      '4': 10
      '5': 10
      '6': 10
      '7': 10
      '8': 9
      '9': 7
      '10': 5
  infernal:
    allow-types:
      - PUFFERFISH
      - BOGGED
      - CREEPER
      - GUARDIAN
      - HUSK
      - PILLAGER
      - SKELETON
      - STRAY
      - WITCH
      - ZOMBIE
      - ZOMBIE_VILLAGER
      - CAVE_SPIDER
      - DROWNED
      - SPIDER
    deny-types: []
  affix:
    count-formula: "level"  # "level" = n级n条词条, "tier" = 旧公式 min + level/tier-threshold
    min: 1
    max: 15              # n级n条时需 >= 等级上限，否则高等级会被截断（例如原 6 则 10 级只有 6 条）
    tier-threshold: 15

# 技能池权重（全局默认，区域可覆盖）
skill-weights:
  # 白色词条
  poisonous: 10
  armoured: 10
  blinding: 10
  withering: 10
  quicksand: 10
  bullwark: 10
  1up: 10
  cloaked: 10
  ender: 10
  ghastly: 10
  lifesteal: 10
  sprint: 10
  sapper: 10
  webber: 10
  molten: 10
  archer: 10
  necromancer: 10
  firework: 10
  ghost: 10
  confusing: 10
  # 黄色词条
  thief: 10
  tosser: 10
  storm: 10
  vengeance: 10
  weakness: 10
  berserk: 10
  mama: 10
  gravity: 10
  mounted: 10
  morph: 10    
  refrigerate: 10
  # 红色词条
  rust: 1
  vexsummoner: 1
  wardenwrath: 1
  swap: 1

# ===========================================
# 炒鸡怪注册表：索引与定期清理
# ===========================================
mob-registry:
  cleanup-enabled: true           # 定期清理不活跃的炒鸡怪
  cleanup-interval-seconds: 120   # 每 N 秒检查一次
  inactive-radius: 64             # 判定活跃：此范围内有玩家
  inactive-seconds: 300           # 超过 N 秒无玩家 nearby 则清除
  kill-on-shutdown: false         # 关服时是否清除所有炒鸡怪

# ===========================================
# 击杀播报
# ===========================================
death-messages:
  enable: true
  name-prefix: "<white>Infernal"
  default-weapon: "拳头"
  # 怪物名 [LvN]前缀+名 的等级档位颜色：key=等级阈值，value=MiniMessage 颜色
  # 初级1-3白/中级4-6蓝/高级7-9紫/炒鸡10-12金/13-15红
  level-tier-colors:
    "1": "<white>"
    "4": "<blue>"
    "7": "<dark_purple>"
    "10": "<gold>"
    "13": "<red>"
  # 玩家名单独上色：普通绿色、OP 深红。玩家击杀怪物与抢人头：11 级及以上全服，否则仅事件所在世界；玩家被炒鸡怪击杀始终全服
  player-color-normal: "<green>"
  player-color-op: "<dark_red>"
  global-broadcast-level-threshold: 11
  # MiniMessage 模板，占位符：<player>（已按身份着色）<weapon> <mob>
  messages:
    - "<player><white>杀死了</white><mob><white>!</white>"
    - "<mob><white>死于</white><player><white>之手!</white>"
    - "<player><white>用</white><weapon><white>消灭了</white><mob><white>!</white>"
    - "<player><white>用</white><weapon><white>埋葬了</white><mob><white>!</white>"
    - "<mob><white>被</white><player><white>用</white><weapon><white>终结!</white>"
    - "<player><white>向</white><mob><white>展现了残酷!</white>"
    - "<mob><white>凄惨地死于</white><player><white>之手!</white>"

  # 玩家被炒鸡怪击杀时的播报（<player>=死者，已按身份着色 <mob>=炒鸡怪名，悬停显示词条）
  slain-by:
    enable: true
    messages:
      - "<player><white>惜败于</white><mob><white>!</white>"
      - "<player><white>被</white><mob><white>击杀!</white>"
      - "<mob><white>残忍地击杀了</white><player>"
    # 怪物手持特殊武器时额外播报（可选）
    with-weapon:
      enable: true
      when: "enchanted"  # enchanted=有附魔 custom_name=有自定义名 non_air=任意非空
      messages:
        - "<player><white>被</white><mob><white>用</white><weapon><white>杀死了!</white>"
        - "<mob><white>用</white><weapon><white>终结了</white><player><white>!</white>"

  # 炒鸡怪被非玩家因素击杀时（摔落/火/其他怪物等）的「抢人头」播报
  # 占位符：<nearest_player>（最近玩家，已按身份着色）、<mob>（炒鸡怪名）、<source>（伤害来源）
  kill-steal:
    enable: false
    range: 48        # 搜索最近玩家的范围（格），超出范围则不播报
    messages:
      - <nearest_player><white>眼睁睁看着</white><mob><white>死于</white><source><white>！</white>
      - <mob><white>没撑到</white><nearest_player><white>补刀，被</white><source><white>收割了！</white>

  # 玩家被炒鸡怪击杀时的播报（<player>=死者，已按身份着色 <mob>=炒鸡怪名，悬停显示词条）
# ===========================================
# 炒鸡小动物：仅“已炒鸡化且类型在清单内”的生物死亡时清除掉落
# 若击杀者为玩家，则向死亡所在世界内全体在线玩家广播（MiniMessage）
# 实体名为 Bukkit EntityType 枚举，大写，如 COW、SHEEP
# ===========================================
protected-animals:
  enable: true
  clear-exp: true   # 是否同时清空经验球（仅针对清单内、且已炒鸡化）
  types:
    - COW
    - MOOSHROOM
    - SHEEP
    - PIG
    - CHICKEN
    - GOAT            # 山羊
    - RABBIT
    - BEE
    - AXOLOTL
    - CAT
    - OCELOT
    - FOX
    - PANDA
    - TURTLE
    - SQUID           # 鱿鱼
    - GLOW_SQUID      # 发光鱿鱼
    - DOLPHIN
    - FROG
    - SNIFFER         # 嗅探兽
    - CAMEL
    - MULE            # 骡
    - DONKEY          # 驴
    - HORSE
    - LLAMA
    - TRADER_LLAMA    # 行商羊驼
    - PARROT
    - BAT
    - ARMADILLO       # 犰狳 
    - SILVERFISH      # 蠹虫
    - ENDERMITE      # 末影螨
    - ZOMBIE_HORSE
    - SKELETON_HORSE
  # 占位符 <player_name> 为击杀者游戏内名称（原文，不着色）；消息发往死亡发生的世界
  message: "<bold><red><player_name>欺负炒鸡小动物！"

