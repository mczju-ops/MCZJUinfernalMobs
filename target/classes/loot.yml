# 炒鸡怪特殊掉落总开关
# 各等级池子放在 loot/ 文件夹下：loot/1.yml、loot/2.yml、loot/3.yml … 每级一个文件，按权重抽
enable: true
replace-vanilla-drops: true

# 战利品轮换：带 rotation-set 的项仅在对应月份可掉落，未配置的项不受影响
rotation:
  enable: true
  sets: 3

# 同一只怪死亡后，从 loot/<level>.yml 的 rewards 里按权重抽取“掉落条目”的次数。
# 允许重复（每抽一次都独立按权重随机）。
# ranges 格式：[level-min, level-max, min-times, max-times]
drop-times:
  enable: true
  # fallback：当怪等级没写到时兜底（例如 >15）
  fallback: [1, 1]
  1: [1, 1]
  2: [1, 1]
  3: [1, 1]
  4: [1, 2]
  5: [1, 2]
  6: [1, 2]
  7: [1, 3]
  8: [1, 3]
  9: [1, 3]
  10: [1, 4]
  11: [1, 5]
  12: [2, 5]
  13: [3, 5]
  14: [4, 5]
  15: [5, 5]
