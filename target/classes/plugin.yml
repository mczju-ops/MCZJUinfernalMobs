name: InfernalMobs
version: 1.0.0-SNAPSHOT
main: com.infernalmobs.InfernalMobsPlugin
api-version: '1.21'
description: 炒鸡怪 - 丰富原版怪物战斗的 Infernal 风格插件
author: yourname
softdepend:
  - MCZJUItemCreator

commands:
  im:
    description: 炒鸡怪调试指令
    usage: /<command> <spawn|stats|debug|reload> [参数]

permissions:
  infernalmobs.reload:
    description: 允许使用 /im reload 重载配置
    default: op
