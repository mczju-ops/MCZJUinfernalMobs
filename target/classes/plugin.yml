name: InfernalMobs
version: 1.0.0-SNAPSHOT
main: com.infernalmobs.InfernalMobsPlugin
api-version: '1.21'
description: 炒鸡怪 - 丰富原版怪物战斗的 Infernal 风格插件
author: yourname
softdepend:
  - MCZJUItemCreator

commands:
  im:
    description: 炒鸡怪管理指令（需权限 infernalmobs.admin）
    usage: /<command> <spawn|stats|debug|reload|clear> [参数]

permissions:
  infernalmobs.admin:
    description: 使用 /im 全部子指令（spawn/stats/debug/reload/clear）
    default: op
  infernalmobs.reload:
    description: 仅允许 /im reload（未给 admin 时可单独授予）
    default: op
