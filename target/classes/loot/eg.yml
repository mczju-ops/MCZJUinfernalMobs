# 等级 1 的掉落池，按 weight 权重抽取一条
rewards:
  - id: diamond
    amount: 1
    weight: 10
    broadcast: true
    broadcast-message: "<gold>恭喜欧皇<yellow>{player}</yellow>击杀了Lv<level>炒鸡怪并爆出{amount}个{item}"
    commands:
      - "title {player} title {\"text\":\"欧皇时刻\",\"color\":\"gold\"}"
      - "playsound minecraft:ui.toast.challenge_complete player {player}"
